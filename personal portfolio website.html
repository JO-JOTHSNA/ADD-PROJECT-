<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Portfolio</title>

<!-- Bootstrap CDN -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
/* ===== CSS ===== */
body {
    scroll-behavior: smooth;
    font-family: Arial, sans-serif;
}

/* Hero Section */
.hero {
    height: 100vh;
    background: linear-gradient(to right, #4facfe, #00f2fe);
    color: white;
    display: flex;
    flex-direction: column;
    justify-content: center;
    text-align: center;
}

.hero span {
    color: yellow;
}

/* Section Animation */
section {
    opacity: 0;
    transform: translateY(50px);
    transition: 0.5s;
}

section.show {
    opacity: 1;
    transform: translateY(0);
}
</style>

</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
    <div class="container">
        <a class="navbar-brand" href="#">MyPortfolio</a>

        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="#about">About</a></li>
                <li class="nav-item"><a class="nav-link" href="#projects">Projects</a></li>
                <li class="nav-item"><a class="nav-link" href="#contact">Contact</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- Hero -->
<section class="hero">
    <h1>Hello, I'm <span>Your Name</span></h1>
    <p>Student | Web Developer</p>
</section>

<!-- About -->
<section id="about" class="container mt-5 pt-5">
    <h2>About Me</h2>
    <p>I am a student passionate about web development and building projects.</p>
</section>

<!-- Projects -->
<section id="projects" class="container mt-5">
    <h2>Projects</h2>
    <div class="row">

        <div class="col-md-4">
            <div class="card">
                <div class="card-body">
                    <h5>Project 1</h5>
                    <p>Portfolio Website</p>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card">
                <div class="card-body">
                    <h5>Project 2</h5>
                    <p>Simple Web App</p>
                </div>
            </div>
        </div>

    </div>
</section>

<!-- Contact -->
<section id="contact" class="container mt-5 mb-5">
    <h2>Contact Me</h2>

    <form id="contactForm">
        <input type="text" id="name" class="form-control mb-3" placeholder="Your Name">
        <input type="email" id="email" class="form-control mb-3" placeholder="Your Email">
        <textarea id="message" class="form-control mb-3" placeholder="Message"></textarea>

        <button type="submit" class="btn btn-primary">Send</button>
        <p id="formMsg"></p>
    </form>
</section>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
// ===== JavaScript =====

// Form Validation
document.getElementById("contactForm").addEventListener("submit", function(e) {
    e.preventDefault();

    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let message = document.getElementById("message").value;
    let msg = document.getElementById("formMsg");

    if(name === "" || email === "" || message === "") {
        msg.innerText = "All fields are required!";
        msg.style.color = "red";
    } else {
        msg.innerText = "Message sent successfully!";
        msg.style.color = "green";
    }
});

// Scroll Animation
let sections = document.querySelectorAll("section");

window.addEventListener("scroll", () => {
    sections.forEach(sec => {
        let top = window.scrollY;
        let offset = sec.offsetTop - 300;

        if(top > offset) {
            sec.classList.add("show");
        }
    });
});
</script>

</body>
</html>
